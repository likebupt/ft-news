# Weekly job: generate digest + rebuild site
# Runs every Monday at 17:00 UTC (= 9:00 AM PST)
name: Weekly Digest & Deploy

on:
  schedule:
    - cron: "0 17 * * 1"  # 17:00 UTC Monday = 9:00 AM PST
  workflow_dispatch:       # Allow manual trigger from GitHub UI
    inputs:
      year:
        description: "ISO year to generate, e.g. 2026. Empty means previous week."
        required: false
        type: number
      week:
        description: "ISO week number to generate, e.g. 22. Empty means previous week."
        required: false
        type: number
      force:
        description: "Ignore cached summaries and regenerate."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load existing data into DB
        run: python main.py migrate

      - name: Ingest latest articles
        run: python main.py ingest

      - name: Run weekly pipeline (digest → build)
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          SITE_BASE_PATH: /ft-news
          BACKFILL_YEAR: ${{ github.event.inputs.year }}
          BACKFILL_WEEK: ${{ github.event.inputs.week }}
          FORCE_REGENERATE: ${{ github.event.inputs.force }}
        run: |
          args=()
          if [ -n "$BACKFILL_YEAR" ]; then
            args+=("--year" "$BACKFILL_YEAR")
          fi
          if [ -n "$BACKFILL_WEEK" ]; then
            args+=("--week" "$BACKFILL_WEEK")
          fi
          if [ "$FORCE_REGENERATE" = "true" ]; then
            args+=("--force")
          fi
          python main.py weekly-pipeline "${args[@]}"

      - name: Commit digest
        run: |
          git config user.name "ft-news-bot"
          git config user.email "ft-news-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly digest: $(date -u +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
